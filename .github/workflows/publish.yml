name: Publish mapping artifacts

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Convert CSV to JSON and XML
        run: python3 scripts/convert.py

      - name: Create release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest mapping build
          files: |
            datapublic-peppol-mapping.json
            datapublic-peppol-mapping.xml
            datapublic-peppol-mapping.csv
            organizations-without-peppol-id.csv
